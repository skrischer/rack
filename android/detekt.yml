complexity:
  TooManyFunctions:
    # Compose UI files legitimately group many small @Composable functions in one
    # cohesive file (a screen plus its row/section sub-composables). The
    # constitution caps function length (<=50 lines) and file length (<=400
    # lines), not function count per file, so the default 11 is too strict here.
    thresholdInFiles: 15
    thresholdInClasses: 15

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'

style:
  MagicNumber:
    # The Recomp design tokens (color hex, dp/sp, motion) are declared as named
    # vals / data-class properties — those declarations ARE the named constants
    # MagicNumber asks for. UI literals are passed as named arguments.
    ignorePropertyDeclaration: true
    ignoreNamedArgument: true
  UnusedPrivateMember:
    # @Preview functions are Compose tooling entry points, not dead code.
    ignoreAnnotated:
      - 'Preview'
